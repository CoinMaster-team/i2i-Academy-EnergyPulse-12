spring.application.name=sensor-simulator
spring.main.web-application-type=none

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SENSOR_CONSUMER_GROUP:energypulse-sensor-simulator-v1}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.coinmaster.energypulse.simulator.event.HomeRegistrationEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.coinmaster.energypulse.simulator.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

app.kafka.topics.home-registration=${KAFKA_REGISTRATION_TOPIC:energypulse.home-registration.v1}
app.kafka.topics.telemetry=${KAFKA_TELEMETRY_TOPIC:energypulse.telemetry.v1}
app.simulator.interval-ms=${SIMULATOR_INTERVAL_MS:2000}

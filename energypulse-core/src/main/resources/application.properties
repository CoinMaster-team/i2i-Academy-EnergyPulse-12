spring.application.name=energypulse-core
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:energypulse}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:energypulse}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}


# Apache Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${CORE_TELEMETRY_CONSUMER_GROUP:energypulse-core-telemetry-v1}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.coinmaster.energypulse.telemetry.event.TelemetryEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.coinmaster.energypulse.telemetry.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
app.kafka.topics.home-registration=${KAFKA_REGISTRATION_TOPIC:energypulse.home-registration.v1}
app.kafka.topics.telemetry=${KAFKA_TELEMETRY_TOPIC:energypulse.telemetry.v1}

# Apache Ignite
app.ignite.enabled=${IGNITE_ENABLED:false}
app.ignite.addresses=${IGNITE_ADDRESSES:localhost:10800}

# Telemetry accounting
app.telemetry.default-interval-ms=${TELEMETRY_DEFAULT_INTERVAL_MS:2000}
app.telemetry.maximum-interval-ms=${TELEMETRY_MAXIMUM_INTERVAL_MS:300000}

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Web integration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Optional local demo data
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}
app.demo-data.contact-email=${DEMO_CONTACT_EMAIL:demo@energypulse.local}

# Gemini recommendations
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}

# Notification processing
app.notifications.processing-enabled=${NOTIFICATION_PROCESSING_ENABLED:false}
app.notifications.polling-interval-ms=${NOTIFICATION_POLLING_INTERVAL_MS:5000}
app.notifications.batch-size=${NOTIFICATION_BATCH_SIZE:20}
app.notifications.mail-from=${MAIL_FROM:}

# SMTP email delivery
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}

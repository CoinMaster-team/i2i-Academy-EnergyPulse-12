services:
  postgres:
    image: postgres:17.10-alpine
    container_name: energypulse-postgres
    restart: unless-stopped
    shm_size: 128mb

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - energypulse-network

  kafka:
    image: apache/kafka:4.2.1
    container_name: energypulse-kafka
    hostname: kafka
    restart: unless-stopped

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >-
        INTERNAL://:29092, EXTERNAL://:9092, CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka:29092, EXTERNAL://localhost:${KAFKA_PORT}

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT, EXTERNAL:PLAINTEXT, CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1

      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    ports:
      - "${KAFKA_PORT}:9092"

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - energypulse-network

  kafka-init:
    image: apache/kafka:4.2.1
    container_name: energypulse-kafka-init
    restart: "no"

    depends_on:
      kafka:
        condition: service_healthy

    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic ${KAFKA_REGISTRATION_TOPIC} \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic ${KAFKA_TELEMETRY_TOPIC} \
          --partitions 3 \
          --replication-factor 1

    networks:
      - energypulse-network

  ignite:
    image: apacheignite/ignite:2.18.0
    container_name: energypulse-ignite
    restart: unless-stopped

    environment:
      IGNITE_QUIET: "false"
      JVM_OPTS: >-
        -Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true

    ports:
      - "${IGNITE_CLIENT_PORT}:10800"

    networks:
      - energypulse-network

volumes:
  postgres_data:

networks:
  energypulse-network:
    name: energypulse-network
